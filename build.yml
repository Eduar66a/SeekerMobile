name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lldd lld openjdk-17-jdk shared-mime-info
        pip install --upgrade pip
        pip install buildozer cython==0.29.36 git+https://github.com/kivy/python-for-android.git@master

    - name: Generate Buildozer Spec
      run: |
        buildozer init
        # Modificamos el archivo spec automáticamente con tus datos
        sed -i 's/^title = .*/title = Seeker Mobile/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = seekermobile/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = org.alien/' buildozer.spec
        sed -i 's/^source.include_exts = .*/source.include_exts = py,png,spec/' buildozer.spec
        sed -i 's/^#icon.filename = .*/icon.filename = %(source.dir)s\/alien.png/' buildozer.spec
        sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/^#android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE/' buildozer.spec
        sed -i 's/^#android.ndk = .*/android.ndk = 25b/' buildozer.spec

    - name: Build with Buildozer
      run: |
        export PIP_BREAK_SYSTEM_PACKAGES=1
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SeekerMobile-APK
        path: bin/*.apk