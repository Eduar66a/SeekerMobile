name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev
        python -m pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Generate Buildozer Spec
      run: |
        buildozer init
        sed -i 's/^title = .*/title = Seeker Mobile/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = seekermobile/' buildozer.spec
        sed -i 's/^package.domain = .*/package.domain = org.alien/' buildozer.spec
        sed -i 's/^source.include_exts = .*/source.include_exts = py,png,spec/' buildozer.spec
        sed -i 's/^#icon.filename = .*/icon.filename = %(source.dir)s\/alien.png/' buildozer.spec
        sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/^#android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,MANAGE_EXTERNAL_STORAGE/' buildozer.spec
        sed -i 's/^#android.ndk_api = .*/android.ndk_api = 24/' buildozer.spec

    - name: Build with Buildozer
      run: |
        export PIP_BREAK_SYSTEM_PACKAGES=1
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SeekerMobile-APK
        path: bin/*.apk
