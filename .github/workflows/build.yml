name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer

      - name: Build with Buildozer
        run: |
          buildozer init
          sed -i 's/#android.ndk =.*/android.ndk = 25b/' buildozer.spec
          sed -i 's/android.api =.*/android.api = 33/' buildozer.spec
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeekerMobile-APK
          path: bin/*.apk
