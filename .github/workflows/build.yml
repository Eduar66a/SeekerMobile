name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK with Kivy Official Action
      uses: kivy/buildozer-action@master
      with:
        workdir: .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SeekerMobile-APK
        path: bin/*.apk
